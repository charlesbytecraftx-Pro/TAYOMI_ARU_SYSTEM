{% extends "admin/change_list.html" %}
{% load i18n admin_urls static admin_list %}

{% block content_title %}
    {{ block.super }}
    <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #8e44ad; display: flex; gap: 20px;">
        <div>
            <span style="display: block; font-size: 12px; color: #666; text-transform: uppercase;">Jumla ya Malipo Yote (Hapa):</span>
            <strong style="font-size: 20px; color: #333;">{{ total_amount }} TZS</strong>
        </div>
        <div style="border-left: 1px solid #ddd; padding-left: 20px;">
            <span style="display: block; font-size: 12px; color: #27ae60; text-transform: uppercase;">Kiasi Kilichothibitishwa (Confirmed):</span>
            <strong style="font-size: 20px; color: #27ae60;">{{ confirmed_amount }} TZS</strong>
        </div>
    </div>
{% endblock %}
